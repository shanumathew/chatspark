<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatSpark — Chatting</title>
  <meta name="description" content="You are now chatting with a stranger on ChatSpark." />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* ── Chat page layout ── */
    html, body { height: 100%; overflow: hidden; }

    .chat-page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 760px;
      margin: 0 auto;
      padding: 12px 12px 0;
    }

    /* ── Top bar ── */
    .chat-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 10px;
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }
    .chat-topbar .logo-sm {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 18px;
      background: linear-gradient(135deg, var(--accent), #ff6584);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #43e97b;
      box-shadow: 0 0 6px #43e97b;
      flex-shrink: 0;
    }
    .status-dot.red { background: #ff4757; box-shadow: 0 0 6px #ff4757; }
    .status-dot.yellow { background: var(--premium); box-shadow: 0 0 6px var(--premium); }
    .partner-label {
      font-size: 13px;
      color: var(--text-secondary);
      flex: 1;
    }
    .shared-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      max-width: 200px;
    }

    /* ── Messages area ── */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 4px 0 16px;
      scroll-behavior: smooth;
    }

    /* System messages */
    .sys-msg {
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
      padding: 4px 0;
    }

    /* ── Input bar ── */
    .input-bar {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      padding: 10px 0 12px;
      flex-shrink: 0;
    }
    .msg-input-wrap {
      flex: 1;
      position: relative;
    }
    .msg-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      resize: none;
      max-height: 120px;
      min-height: 48px;
      line-height: 1.5;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .msg-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    .msg-input::placeholder { color: var(--text-dim); }
    .send-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #9b59f5);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition);
      box-shadow: 0 4px 16px rgba(108,99,255,0.4);
    }
    .send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(108,99,255,0.6); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* ── Controls bar ── */
    .controls-bar {
      display: flex;
      gap: 8px;
      padding: 0 0 10px;
      flex-shrink: 0;
    }

    /* ── Disconnected overlay ── */
    #disconnected-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(11,12,26,0.9);
      backdrop-filter: blur(12px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
    }
    #disconnected-overlay h2 { font-size: 24px; }
    #disconnected-overlay p { font-size: 14px; color: var(--text-secondary); text-align: center; max-width: 300px; }

    /* ── Connecting overlay ── */
    #connecting-overlay {
      position: fixed; inset: 0; z-index: 40;
      background: rgba(11,12,26,0.95);
      backdrop-filter: blur(10px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
    }
    #connecting-overlay p { color: var(--text-secondary); font-size: 15px; }

    /* Char count */
    .char-count {
      position: absolute;
      right: 12px; bottom: 10px;
      font-size: 11px;
      color: var(--text-dim);
      pointer-events: none;
    }

    @media (max-width: 600px) {
      .chat-page { padding: 8px 8px 0; }
      .shared-chips { display: none; }
    }
  </style>
</head>
<body>
  <div class="gradient-bg"></div>

  <!-- Connecting/waiting overlay -->
  <div id="connecting-overlay">
    <div class="spinner"></div>
    <p id="connecting-text">Connecting…</p>
    <button class="btn btn-secondary" onclick="location.href='/'">← Back</button>
  </div>

  <!-- Disconnected overlay (shown when partner leaves) -->
  <div id="disconnected-overlay" class="hidden">
    <div style="font-size: 48px">👋</div>
    <h2>Stranger left the chat</h2>
    <p id="disconnect-stats"></p>
    <div style="display:flex; gap:10px">
      <button class="btn btn-primary" id="find-next-btn">Find Next →</button>
      <button class="btn btn-secondary" onclick="location.href='/'">← Home</button>
    </div>
  </div>

  <!-- Main chat layout -->
  <div class="chat-page">

    <!-- Top bar -->
    <div class="chat-topbar">
      <span class="logo-sm">⚡</span>
      <div class="status-dot" id="status-dot"></div>
      <span class="partner-label" id="partner-label">Connecting…</span>
      <div class="shared-chips" id="shared-chips-topbar"></div>
      <div id="premium-indicator"></div>
    </div>

    <!-- Messages -->
    <div class="messages-area" id="messages-area">
      <!-- Messages injected by JS -->
    </div>

    <!-- Controls -->
    <div class="controls-bar">
      <button class="btn btn-danger" id="stop-btn" style="flex:1">
        ⏹ Stop
      </button>
      <button class="btn btn-secondary" id="next-btn" style="flex:1" disabled>
        → Next
      </button>
      <button class="btn btn-secondary btn-icon" id="home-btn" title="Home">
        🏠
      </button>
    </div>

    <!-- Input -->
    <div class="input-bar">
      <div class="msg-input-wrap">
        <textarea
          class="msg-input"
          id="msg-input"
          placeholder="Type a message…"
          rows="1"
          maxlength="500"
          disabled
        ></textarea>
        <div class="char-count" id="char-count"></div>
      </div>
      <button class="send-btn" id="send-btn" disabled title="Send message">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <line x1="22" y1="2" x2="11" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
